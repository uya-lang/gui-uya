name: gui-ci

on:
  push:
    paths:
      - "gui/**"
      - "docs/**"
      - "Makefile"
      - "tools/**"
      - "uya.toml"
      - ".github/workflows/gui-phase0.yml"
  pull_request:
    paths:
      - "gui/**"
      - "docs/**"
      - "Makefile"
      - "tools/**"
      - "uya.toml"
      - ".github/workflows/gui-phase0.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show compiler version
        run: ./uya/bin/uya --version
      - name: Build smoke example
        run: make build
      - name: Run GUI tests
        run: make test
      - name: Verify GUI benchmark thresholds
        run: make bench-verify
      - name: Install SDL2 headers
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev
      - name: Build Linux simulator
        run: make sim-build
      - name: Smoke-run Linux simulator in headless mode
        run: make sim-headless SIM_HEADLESS_ARGS="--max-frames 2 --screenshot build/sim/ci.bmp"
      - name: Generate dashboard compare report
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: make dashboard-compare-report DASHBOARD_COMPARE_FRAMES=30
      - name: Generate API docs
        run: make docs-api
