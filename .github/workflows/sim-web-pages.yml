name: sim-web-pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sim-web-pages.yml"
      - "Makefile"
      - "gui/**"
      - "third_party/**"
      - "tools/**"
      - "uya/**"
      - "uya.toml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sim-web-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UYA_DDZ_USE_OPENAI: "1"
      OPENAI_BASE_URL: "https://purple-hat-afd8.funnywwh-1fe.workers.dev/"
      OPENAI_API_PATH: "/ddz/decision"
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        run: |
          sudo apt-get update
          sudo apt-get install -y emscripten

      - name: Run richtext web smoke
        run: make sim-web-richtext-smoke MODE=release WEB_LEGACY_VM_SUPPORT=1

      - name: Build Pages artifact
        run: make sim-web-pages MODE=release WEB_LEGACY_VM_SUPPORT=1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
