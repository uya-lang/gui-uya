[package]
name = "gui_uya"
version = "0.1.0-dev"
uya_min_version = "0.9.4"
description = "Embedded GUI runtime and simulator scaffolding built with Uya."

[layout]
source_dir = "gui"
test_dir = "gui/tests"
bench_dir = "gui/benchmarks"
example_dir = "gui/examples"

[tool.make]
default_target = "test"
smoke_example = "gui/phase2_smoke.uya"
