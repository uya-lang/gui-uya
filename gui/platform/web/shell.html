<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UyaGUI Web</title>
    <style>
      :root {
        color-scheme: dark;
        --uya-gui-log-height: 120px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0f1115;
        color: #d8dee9;
        font: 14px/1.4 monospace;
      }

      body {
        display: grid;
        grid-template-rows: 1fr;
      }

      body.status-visible {
        grid-template-rows: auto 1fr;
      }

      body.debug-panel {
        grid-template-rows: auto 1fr var(--uya-gui-log-height);
      }

      #uya-gui-status {
        padding: 8px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        white-space: pre-wrap;
        display: none;
      }

      body.debug-panel #uya-gui-status {
        display: block;
      }

      body.status-visible #uya-gui-status {
        display: block;
      }

      #uya-gui-root {
        position: relative;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      #uya-gui-stage {
        position: relative;
        display: inline-block;
      }

      canvas {
        display: block;
        border: 0;
        outline: 0;
        image-rendering: pixelated;
      }

      #uya-gui-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #uya-gui-log {
        margin: 0;
        padding: 8px 12px;
        min-height: 0;
        max-height: 0;
        overflow: auto;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: #0a0c10;
        white-space: pre-wrap;
        display: none;
      }

      body.debug-panel #uya-gui-log {
        display: block;
        height: var(--uya-gui-log-height);
        min-height: var(--uya-gui-log-height);
        max-height: var(--uya-gui-log-height);
      }
    </style>
    <script>
      (function() {
        function parseArgsString(text) {
          if (!text) {
            return [];
          }
          var out = [];
          var cur = '';
          var quote = '';
          var escape = false;
          for (var i = 0; i < text.length; ++i) {
            var ch = text[i];
            if (escape) {
              cur += ch;
              escape = false;
              continue;
            }
            if (ch === '\\') {
              escape = true;
              continue;
            }
            if (quote) {
              if (ch === quote) {
                quote = '';
              } else {
                cur += ch;
              }
              continue;
            }
            if (ch === '"' || ch === "'") {
              quote = ch;
              continue;
            }
            if (/\s/.test(ch)) {
              if (cur.length > 0) {
                out.push(cur);
                cur = '';
              }
              continue;
            }
            cur += ch;
          }
          if (cur.length > 0) {
            out.push(cur);
          }
          return out;
        }

        function parseArgsFromLocation() {
          if (typeof window === 'undefined') {
            return [];
          }
          var params = new URLSearchParams(window.location.search);
          var explicitArgs = params.getAll('arg');
          var demo = params.get('demo');
          if (explicitArgs.length > 0) {
            return withQueryArgs(explicitArgs, demo);
          }
          return withQueryArgs(parseArgsString(params.get('args') || ''), demo);
        }

        function upsertArgValue(args, flag, value) {
          if (!value) {
            return args;
          }
          for (var i = 0; i + 1 < args.length; ++i) {
            if (args[i] === flag) {
              args[i + 1] = value;
              return args;
            }
          }
          args.push(flag, value);
          return args;
        }

        function withQueryArgs(args, demo) {
          var out = args.slice();
          upsertArgValue(out, '--demo', demo);
          return out;
        }

        function findArgValue(args, flag, fallback) {
          var value = fallback;
          for (var i = 0; i + 1 < args.length; ++i) {
            if (args[i] === flag) {
              value = args[i + 1];
              ++i;
            }
          }
          return value;
        }

        function resolveBoolFlag(args, positiveFlag, negativeFlag, fallback) {
          var value = fallback;
          for (var i = 0; i < args.length; ++i) {
            if (args[i] === positiveFlag) {
              value = true;
            } else if (args[i] === negativeFlag) {
              value = false;
            }
          }
          return value;
        }

        function ensureStageCanvas(canvasId) {
          var root = document.getElementById('uya-gui-root');
          var stage = document.getElementById('uya-gui-stage');
          var canvas = document.getElementById(canvasId);
          if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.id = canvasId;
            stage.insertBefore(canvas, document.getElementById('uya-gui-overlay'));
          } else if (canvas.parentNode !== stage) {
            stage.insertBefore(canvas, document.getElementById('uya-gui-overlay'));
          }
          root.dataset.canvasId = canvasId;
          return canvas;
        }

        function hasFileLikeSuffix(pathname) {
          return /\/[^/]+\.[^/]+$/.test(pathname || '');
        }

        function currentPageBaseUrl() {
          if (typeof window === 'undefined' || !window.location) {
            return '';
          }
          var pathname = window.location.pathname || '/';
          if (hasFileLikeSuffix(pathname)) {
            pathname = pathname.substring(0, pathname.lastIndexOf('/') + 1);
          } else if (!/\/$/.test(pathname)) {
            pathname += '/';
          }
          return window.location.origin + pathname;
        }

        function resolveAssetUrl(path, prefix) {
          if (!path || /^(?:[a-z]+:)?\/\//i.test(path) || path.indexOf('data:') === 0 || path.indexOf('blob:') === 0) {
            return path;
          }
          var base = prefix || currentPageBaseUrl();
          if (!base) {
            return path;
          }
          try {
            return new URL(path, base).toString();
          } catch (err) {
            return path;
          }
        }

        var bootArgs = parseArgsFromLocation();
        var debugPanel = false;
        if (typeof window !== 'undefined') {
          var debugParams = new URLSearchParams(window.location.search);
          debugPanel = debugParams.get('debug') === '1';
        }

        function applyDebugPanelMode() {
          if (typeof document === 'undefined' || !document.body) {
            return;
          }
          if (debugPanel) {
            document.body.classList.add('debug-panel');
          } else {
            document.body.classList.remove('debug-panel');
          }
        }
        if (typeof document !== 'undefined') {
          if (document.body) {
            applyDebugPanelMode();
          } else {
            document.addEventListener('DOMContentLoaded', applyDebugPanelMode, { once: true });
          }
        }
        var defaultCanvasId = findArgValue(bootArgs, '--canvas-id', 'uya-gui-canvas');
        var defaultFontAsset = findArgValue(bootArgs, '--font-asset', 'system_ui_cjk_font.data');
        var bitmapFontSizes = [10, 11, 12, 13, 14, 15, 16, 17, 18, 20, 22, 24, 25, 26, 29, 31, 35];
        var bitmapFontAssetsBySize = Object.create(null);
        for (var bitmapFontIndex = 0; bitmapFontIndex < bitmapFontSizes.length; bitmapFontIndex += 1) {
          var bitmapFontSize = bitmapFontSizes[bitmapFontIndex];
          bitmapFontAssetsBySize[bitmapFontSize] = {
            descPath: '/app/gui/render/generated/wqy_microhei_demo_' + bitmapFontSize + '.fnt',
            descUrl: resolveAssetUrl('gui/render/generated/wqy_microhei_demo_' + bitmapFontSize + '.fnt'),
            bitmapPath: '/app/gui/render/generated/wqy_microhei_demo_' + bitmapFontSize + '.a8',
            bitmapUrl: resolveAssetUrl('gui/render/generated/wqy_microhei_demo_' + bitmapFontSize + '.a8')
          };
        }
        var fitWindow = resolveBoolFlag(bootArgs, '--fit-window', '--fixed-window', true);
        var persistData = resolveBoolFlag(bootArgs, '--persist-data', '--no-persist-data', false);
        var outputElement = null;
        var statusElement = null;

        function applyStatusVisibility(visible) {
          if (typeof document === 'undefined') {
            return;
          }
          if (!document.body) {
            document.addEventListener('DOMContentLoaded', function() {
              applyStatusVisibility(visible);
            }, { once: true });
            return;
          }
          if (visible) {
            document.body.classList.add('status-visible');
          } else {
            document.body.classList.remove('status-visible');
          }
        }

        var Module = {
          arguments: bootArgs,
          preRun: [],
          postRun: [],
          locateFile: function(path, prefix) {
            return resolveAssetUrl(path, prefix);
          },
          uyaGuiAutoDownload: true,
          uyaGuiCanvasId: defaultCanvasId,
          uyaGuiFitWindow: fitWindow,
          uyaGuiPersistData: persistData,
          uyaGuiFontAsset: resolveAssetUrl(defaultFontAsset),
          uyaGuiBitmapFontAssetsBySize: bitmapFontAssetsBySize,
          uyaGuiBitmapFontStates: Object.create(null),
          uyaGuiFontLoadStarted: false,
          uyaGuiFontLoadFinished: false,
          uyaGuiCompleted: false,
          uyaGuiCompletion: null,
          uyaGuiHasPresented: false,
          uyaGuiStatusText: '',
          uyaGuiLastPresentAt: 0,
          uyaGuiLastScreenshotPath: null,
          uyaGuiFiles: {},
          print: function() {
            if (!outputElement) {
              outputElement = document.getElementById('uya-gui-log');
            }
            var text = Array.prototype.join.call(arguments, ' ');
            console.log(text);
            if (debugPanel && outputElement) {
              outputElement.textContent += text + '\n';
              outputElement.scrollTop = outputElement.scrollHeight;
            }
          },
          printErr: function() {
            var text = Array.prototype.join.call(arguments, ' ');
            console.error(text);
            Module.print(text);
          },
          setStatus: function(text) {
            Module.uyaGuiStatusText = text || '';
            if (!statusElement) {
              statusElement = document.getElementById('uya-gui-status');
            }
            if (statusElement) {
              statusElement.textContent = Module.uyaGuiStatusText;
            }
            applyStatusVisibility(debugPanel || !Module.uyaGuiHasPresented || !!Module.uyaGuiStatusText);
          },
          canvas: document.getElementById(defaultCanvasId),
        };

        Module.uyaGuiBitmapFontState = function(pixelHeight) {
          var state = Module.uyaGuiBitmapFontStates[pixelHeight | 0];
          if (state === 'loading') {
            return 1;
          }
          if (state === 'ready') {
            return 2;
          }
          if (state === 'failed') {
            return 3;
          }
          return 0;
        };

        Module.uyaGuiRequestBitmapFont = function(pixelHeight) {
          var size = pixelHeight | 0;
          var asset = Module.uyaGuiBitmapFontAssetsBySize[size];
          var state = Module.uyaGuiBitmapFontStates[size];

          if (!asset) {
            return 0;
          }
          if (state === 'loading' || state === 'ready') {
            return 1;
          }
          if (typeof fetch !== 'function') {
            Module.uyaGuiBitmapFontStates[size] = 'failed';
            Module.printErr('[web] bitmap font request failed: fetch is unavailable for size', size);
            if (typeof Module._uya_gui_web_host_feed_event === 'function') {
              Module._uya_gui_web_host_feed_event(8, 0, 0, 0, 0, 0);
            }
            return 0;
          }

          function fetchBinary(url, label) {
            return fetch(url).then(function(response) {
              if (!response.ok) {
                throw new Error(label + ': HTTP ' + response.status);
              }
              return response.arrayBuffer();
            }).then(function(buffer) {
              return new Uint8Array(buffer);
            });
          }

          Module.uyaGuiBitmapFontStates[size] = 'loading';
          Promise.all([
            fetchBinary(asset.descUrl, 'desc ' + size),
            fetchBinary(asset.bitmapUrl, 'bitmap ' + size)
          ]).then(function(results) {
            try {
              FS.mkdirTree('/app/gui/render/generated');
            } catch (err) {
            }
            try {
              FS.unlink(asset.descPath);
            } catch (err) {
            }
            try {
              FS.unlink(asset.bitmapPath);
            } catch (err) {
            }
            FS.writeFile(asset.descPath, results[0], { canOwn: true });
            FS.writeFile(asset.bitmapPath, results[1], { canOwn: true });
            Module.uyaGuiBitmapFontStates[size] = 'ready';
            Module.print('[web] bitmap font loaded:', size);
            if (typeof Module._uya_gui_web_host_feed_event === 'function') {
              Module._uya_gui_web_host_feed_event(8, 0, 0, 0, 0, 0);
            }
          }).catch(function(err) {
            Module.uyaGuiBitmapFontStates[size] = 'failed';
            Module.printErr('[web] bitmap font load failed for size', size + ':', err && err.message ? err.message : err);
            if (typeof Module._uya_gui_web_host_feed_event === 'function') {
              Module._uya_gui_web_host_feed_event(8, 0, 0, 0, 0, 0);
            }
          });
          return 1;
        };

        window.Module = Module;
        applyStatusVisibility(true);
        if (typeof document !== 'undefined' && !document.body) {
          document.addEventListener('DOMContentLoaded', function() {
            if (!statusElement) {
              statusElement = document.getElementById('uya-gui-status');
            }
            if (statusElement) {
              statusElement.textContent = Module.uyaGuiStatusText;
            }
            applyStatusVisibility(debugPanel || !Module.uyaGuiHasPresented || !!Module.uyaGuiStatusText);
          }, { once: true });
        }

        Module.preRun.push(function() {
          if (!Module.uyaGuiPersistData) {
            return;
          }
          try {
            FS.mkdir('/data');
          } catch (err) {
          }
          FS.mount(IDBFS, {}, '/data');
          addRunDependency('uya-gui-idbfs-load');
          FS.syncfs(true, function(err) {
            if (err) {
              Module.printErr('[web] IDBFS load failed:', err);
            }
            removeRunDependency('uya-gui-idbfs-load');
          });
        });

        Module.uyaGuiMaybeStartFontLoad = function() {
          var fontAssetUrl = Module.uyaGuiFontAsset;
          if (!fontAssetUrl || Module.uyaGuiFontLoadStarted || Module.uyaGuiFontLoadFinished) {
            return;
          }
          Module.uyaGuiFontLoadStarted = true;

          function finish() {
            Module.uyaGuiFontLoadFinished = true;
          }

          function writeFontFile(bytes) {
            try {
              FS.mkdirTree('/app/fonts');
            } catch (err) {
            }
            try {
              FS.unlink('/app/fonts/system_ui_cjk_font');
            } catch (err) {
            }
            FS.writeFile('/app/fonts/system_ui_cjk_font', bytes, { canOwn: true });
          }

          function reportLoaded(byteLength) {
            Module.print('[web] CJK font loaded:', fontAssetUrl, '(' + byteLength + ' bytes)');
          }

          function reportFailed(err) {
            Module.printErr('[web] CJK font load failed:', fontAssetUrl, err && err.message ? err.message : err);
          }

          if (typeof fetch !== 'function') {
            reportFailed(new Error('fetch is unavailable in this browser'));
            finish();
            return;
          }

          fetch(fontAssetUrl).then(function(response) {
            if (!response.ok) {
              throw new Error('HTTP ' + response.status);
            }
            return response.arrayBuffer();
          }).then(function(buffer) {
            var bytes = new Uint8Array(buffer);
            writeFontFile(bytes);
            reportLoaded(bytes.byteLength);
            if (typeof Module._uya_gui_web_host_feed_event === 'function') {
              Module._uya_gui_web_host_feed_event(8, 0, 0, 0, 0, 0);
            }
          }).catch(function(err) {
            reportFailed(err);
          }).finally(finish);
        };

        Module.uyaGuiUpdateCanvasCss = function() {
          var canvas = Module.uyaGuiCanvas;
          var overlay = Module.uyaGuiOverlayCanvas;
          var stage = document.getElementById('uya-gui-stage');
          if (!canvas || !overlay || !stage) {
            return;
          }
          var cssScale = Math.max(Module.uyaGuiScale || 1, 1);
          if (Module.uyaGuiFitWindow) {
            var availWidth = Math.max(window.innerWidth - 24, 1);
            var availHeight = Math.max(window.innerHeight - 24 - document.getElementById('uya-gui-status').offsetHeight - document.getElementById('uya-gui-log').offsetHeight, 1);
            var fitScale = Math.min(availWidth / canvas.width, availHeight / canvas.height);
            if (isFinite(fitScale) && fitScale > 0) {
              cssScale = fitScale;
            }
          }
          var cssWidth = Math.max(canvas.width * cssScale, 1);
          var cssHeight = Math.max(canvas.height * cssScale, 1);
          stage.style.width = cssWidth + 'px';
          stage.style.height = cssHeight + 'px';
          canvas.style.width = cssWidth + 'px';
          canvas.style.height = cssHeight + 'px';
          overlay.style.width = cssWidth + 'px';
          overlay.style.height = cssHeight + 'px';
        };

        function tryCreate2dContext(canvas) {
          if (!canvas || !canvas.getContext) {
            return null;
          }
          var attempts = [
            { alpha: false, desynchronized: true },
            { alpha: false },
            null
          ];
          for (var i = 0; i < attempts.length; ++i) {
            try {
              var ctx = attempts[i] ? canvas.getContext('2d', attempts[i]) : canvas.getContext('2d');
              if (ctx) {
                return ctx;
              }
            } catch (err) {
            }
          }
          return null;
        }

        Module.uyaGuiEnsureOverlayContext = function() {
          var overlay = Module.uyaGuiOverlayCanvas;
          if (!overlay || !overlay.getContext) {
            return null;
          }
          if (!Module.uyaGuiOverlayCtx2d) {
            try {
              Module.uyaGuiOverlayCtx2d = overlay.getContext('2d');
            } catch (err) {
              Module.uyaGuiOverlayCtx2d = null;
            }
          }
          return Module.uyaGuiOverlayCtx2d;
        };

        Module.uyaGuiConfigureOverlayCanvas = function(enabled) {
          var overlay = Module.uyaGuiOverlayCanvas;
          var canvas = Module.uyaGuiCanvas;
          if (!overlay || !canvas) {
            return false;
          }
          if (!enabled) {
            overlay.width = 0;
            overlay.height = 0;
            overlay.style.display = 'none';
            Module.uyaGuiOverlayCtx2d = null;
            return true;
          }
          overlay.width = canvas.width;
          overlay.height = canvas.height;
          overlay.style.display = 'block';
          return !!Module.uyaGuiEnsureOverlayContext();
        };

        Module.uyaGuiSetupCanvas = function(width, height, scale, title) {
          if (typeof document === 'undefined') {
            return 0;
          }
          var canvas = ensureStageCanvas(Module.uyaGuiCanvasId || 'uya-gui-canvas');
          var overlay = document.getElementById('uya-gui-overlay');
          canvas.width = width;
          canvas.height = height;
          canvas.tabIndex = 0;
          canvas.style.touchAction = 'none';
          canvas.style.overscrollBehavior = 'contain';
          canvas.style.background = '#000';
          overlay.width = 0;
          overlay.height = 0;
          overlay.style.display = 'none';
          overlay.style.touchAction = 'none';
          Module.canvas = canvas;
          Module.uyaGuiCanvas = canvas;
          Module.uyaGuiOverlayCanvas = overlay;
          Module.uyaGuiScale = Math.max(scale || 1, 1);
          Module.uyaGuiCtx2d = tryCreate2dContext(canvas);
          Module.uyaGuiOverlayCtx2d = null;
          Module.uyaGuiDirtyOverlayEnabled = false;
          if (!Module.uyaGuiCtx2d) {
            return 0;
          }
          try {
            Module.uyaGuiImageData = Module.uyaGuiCtx2d.createImageData(width, height);
          } catch (err) {
            Module.printErr('[web] createImageData failed:', err);
            return 0;
          }
          if (title) {
            document.title = title;
          }
          Module.uyaGuiUpdateCanvasCss();
          if (canvas.__uyaGuiBound) {
            return 1;
          }

          function mapKey(key) {
            switch (key) {
              case 'Escape': return 27;
              case 'Enter': return 13;
              case ' ': return 32;
              case 'Spacebar': return 32;
              case 'ArrowLeft': return 1000;
              case 'ArrowRight': return 1001;
              case 'ArrowUp': return 1002;
              case 'ArrowDown': return 1003;
              case 'F11': return 1011;
              default: return 0;
            }
          }

          function feed(kind, x, y, value, keyCode, modifiers) {
            Module._uya_gui_web_host_feed_event(kind, x | 0, y | 0, value | 0, keyCode | 0, modifiers | 0);
          }

          function pointFromEvent(clientX, clientY) {
            var rect = canvas.getBoundingClientRect();
            var scaleX = rect.width > 0 ? canvas.width / rect.width : 1;
            var scaleY = rect.height > 0 ? canvas.height / rect.height : 1;
            var x = Math.round((clientX - rect.left) * scaleX);
            var y = Math.round((clientY - rect.top) * scaleY);
            x = Math.max(0, Math.min(canvas.width - 1, x));
            y = Math.max(0, Math.min(canvas.height - 1, y));
            return { x: x, y: y };
          }

          function modifierBits(evt) {
            return (evt.altKey ? 1 : 0) | (evt.ctrlKey ? 2 : 0) | (evt.metaKey ? 4 : 0) | (evt.shiftKey ? 8 : 0);
          }

          canvas.addEventListener('mousedown', function(evt) {
            var p = pointFromEvent(evt.clientX, evt.clientY);
            canvas.focus();
            feed(2, p.x, p.y, 0, 0, modifierBits(evt));
            evt.preventDefault();
          });
          window.addEventListener('mousemove', function(evt) {
            var p = pointFromEvent(evt.clientX, evt.clientY);
            feed(1, p.x, p.y, 0, 0, modifierBits(evt));
          });
          window.addEventListener('mouseup', function(evt) {
            var p = pointFromEvent(evt.clientX, evt.clientY);
            feed(3, p.x, p.y, 0, 0, modifierBits(evt));
            evt.preventDefault();
          });
          canvas.addEventListener('touchstart', function(evt) {
            if (evt.changedTouches.length < 1) {
              return;
            }
            var touch = evt.changedTouches[0];
            var p = pointFromEvent(touch.clientX, touch.clientY);
            canvas.focus();
            feed(2, p.x, p.y, 0, 0, 0);
            evt.preventDefault();
          }, { passive: false });
          canvas.addEventListener('touchmove', function(evt) {
            if (evt.changedTouches.length < 1) {
              return;
            }
            var touch = evt.changedTouches[0];
            var p = pointFromEvent(touch.clientX, touch.clientY);
            feed(1, p.x, p.y, 0, 0, 0);
            evt.preventDefault();
          }, { passive: false });
          canvas.addEventListener('touchend', function(evt) {
            if (evt.changedTouches.length < 1) {
              return;
            }
            var touch = evt.changedTouches[0];
            var p = pointFromEvent(touch.clientX, touch.clientY);
            feed(3, p.x, p.y, 0, 0, 0);
            evt.preventDefault();
          }, { passive: false });
          canvas.addEventListener('touchcancel', function(evt) {
            feed(9, 0, 0, 0, 0, 0);
            evt.preventDefault();
          }, { passive: false });
          canvas.addEventListener('wheel', function(evt) {
            var p = pointFromEvent(evt.clientX, evt.clientY);
            var delta = evt.deltaY > 0 ? 1 : (evt.deltaY < 0 ? -1 : 0);
            feed(4, p.x, p.y, delta, 0, modifierBits(evt));
            evt.preventDefault();
          }, { passive: false });
          canvas.addEventListener('keydown', function(evt) {
            var mapped = mapKey(evt.key);
            if (!mapped) {
              return;
            }
            feed(5, 0, 0, 0, mapped, modifierBits(evt));
            evt.preventDefault();
          });
          canvas.addEventListener('keyup', function(evt) {
            var mapped = mapKey(evt.key);
            if (!mapped) {
              return;
            }
            feed(6, 0, 0, 0, mapped, modifierBits(evt));
            evt.preventDefault();
          });
          if (!Module.uyaGuiWindowBound) {
            window.addEventListener('blur', function() {
              feed(7, 0, 0, 0, 0, 0);
            });
            document.addEventListener('visibilitychange', function() {
              if (document.hidden) {
                feed(7, 0, 0, 0, 0, 0);
              } else {
                Module.uyaGuiUpdateCanvasCss();
                feed(8, 0, 0, 0, 0, 0);
              }
            });
            window.addEventListener('resize', function() {
              Module.uyaGuiUpdateCanvasCss();
              feed(8, 0, 0, 0, 0, 0);
            });
            Module.uyaGuiWindowBound = true;
          }
          canvas.__uyaGuiBound = true;
          return 1;
        };

        Module.uyaGuiPresent = function(rgbaPtr, width, height) {
          var imageData = Module.uyaGuiImageData;
          var ctx = Module.uyaGuiCtx2d;
          if (!imageData || !ctx) {
            return;
          }
          var src = Module.HEAPU8.subarray(rgbaPtr, rgbaPtr + width * height * 4);
          imageData.data.set(src);
          ctx.putImageData(imageData, 0, 0);
          if (!Module.uyaGuiHasPresented) {
            Module.uyaGuiHasPresented = true;
            Module.setStatus('');
            Module.uyaGuiMaybeStartFontLoad();
          }
          Module.uyaGuiLastPresentAt = Date.now();
        };

        Module.uyaGuiPresentRegion = function(rgbaPtr, width, height, rectX, rectY, rectW, rectH) {
          var imageData = Module.uyaGuiImageData;
          var ctx = Module.uyaGuiCtx2d;
          if (!imageData || !ctx || rectW <= 0 || rectH <= 0) {
            return;
          }
          var rowBytes = rectW * 4;
          for (var y = 0; y < rectH; ++y) {
            var srcOffset = rgbaPtr + (((rectY + y) * width + rectX) * 4);
            var dstOffset = (((rectY + y) * width + rectX) * 4);
            imageData.data.set(Module.HEAPU8.subarray(srcOffset, srcOffset + rowBytes), dstOffset);
          }
          ctx.putImageData(imageData, 0, 0, rectX, rectY, rectW, rectH);
          if (!Module.uyaGuiHasPresented) {
            Module.uyaGuiHasPresented = true;
            Module.setStatus('');
            Module.uyaGuiMaybeStartFontLoad();
          }
          Module.uyaGuiLastPresentAt = Date.now();
        };

        Module.uyaGuiClearDirtyOverlay = function() {
          var overlay = Module.uyaGuiOverlayCtx2d;
          if (!overlay) {
            return;
          }
          overlay.clearRect(0, 0, Module.uyaGuiOverlayCanvas.width, Module.uyaGuiOverlayCanvas.height);
        };

        Module.uyaGuiDrawDirtyRect = function(x, y, w, h) {
          if (!Module.uyaGuiDirtyOverlayEnabled) {
            return;
          }
          var overlay = Module.uyaGuiEnsureOverlayContext();
          if (!overlay) {
            return;
          }
          overlay.save();
          overlay.strokeStyle = 'rgba(255, 96, 96, 0.9)';
          overlay.lineWidth = 1;
          overlay.strokeRect(x + 0.5, y + 0.5, Math.max(w - 1, 0), Math.max(h - 1, 0));
          overlay.restore();
        };

        Module.uyaGuiSetDirtyOverlayEnabled = function(enabled) {
          if (!enabled) {
            Module.uyaGuiDirtyOverlayEnabled = false;
            Module.uyaGuiClearDirtyOverlay();
            Module.uyaGuiConfigureOverlayCanvas(false);
            return;
          }
          if (!Module.uyaGuiConfigureOverlayCanvas(true)) {
            Module.printErr('[web] dirty overlay disabled: overlay canvas unavailable');
            Module.uyaGuiDirtyOverlayEnabled = false;
            return;
          }
          Module.uyaGuiDirtyOverlayEnabled = true;
        };

        Module.uyaGuiSetTitle = function(title) {
          if (typeof document !== 'undefined' && title) {
            document.title = title;
          }
        };

        Module.uyaGuiRequestFullscreen = function() {
          var target = Module.uyaGuiCanvas || Module.canvas;
          if (!target || !target.requestFullscreen) {
            return 0;
          }
          target.requestFullscreen().catch(function() {});
          return 1;
        };

        Module.uyaGuiExposeFile = function(path, suggestedName, mimeType) {
          if (!path || typeof FS === 'undefined') {
            return 0;
          }
          try {
            var bytes = FS.readFile(path);
            Module.uyaGuiFiles[path] = {
              path: path,
              name: suggestedName || path.split('/').pop() || 'download.bin',
              mime: mimeType || 'application/octet-stream',
              size: bytes.length,
            };
            if (Module.uyaGuiAutoDownload && typeof document !== 'undefined') {
              var blob = new Blob([bytes], { type: Module.uyaGuiFiles[path].mime });
              var url = URL.createObjectURL(blob);
              var link = document.createElement('a');
              link.href = url;
              link.download = Module.uyaGuiFiles[path].name;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              setTimeout(function() {
                URL.revokeObjectURL(url);
              }, 0);
            }
            return 1;
          } catch (err) {
            Module.printErr('[web] expose file failed:', path, err);
            return 0;
          }
        };

        Module.uyaGuiResolveScreenshotPath = function() {
          var path = findArgValue(Module.arguments || [], '--screenshot', '');
          return path || '/tmp/last_frame.png';
        };

        Module.uyaGuiShutdown = function() {
          Module.uyaGuiCompleted = true;
          Module.uyaGuiCompletion = {
            completedAt: Date.now(),
            screenshotPath: Module.uyaGuiResolveScreenshotPath(),
            persistData: Module.uyaGuiPersistData,
            persistSynced: !Module.uyaGuiPersistData,
          };
          var screenshotPath = Module.uyaGuiCompletion.screenshotPath;
          if (typeof FS !== 'undefined') {
            try {
              if (FS.analyzePath(screenshotPath).exists) {
                Module.uyaGuiLastScreenshotPath = screenshotPath;
                Module.uyaGuiExposeFile(screenshotPath, screenshotPath.split('/').pop() || 'last_frame.png', 'image/png');
              }
            } catch (err) {
              Module.printErr('[web] screenshot export failed:', err);
            }
            if (Module.uyaGuiPersistData) {
              FS.syncfs(false, function(err) {
                if (err) {
                  Module.uyaGuiCompletion.persistError = String(err);
                }
                Module.uyaGuiCompletion.persistSynced = true;
              });
            }
          }
        };

        Module.setStatus('Booting Web runtime...');
        window.addEventListener('error', function() {
          Module.setStatus('Exception thrown, see browser console.');
        });
      })();
    </script>
  </head>
  <body>
    <div id="uya-gui-status">Booting Web runtime...</div>
    <div id="uya-gui-root">
      <div id="uya-gui-stage">
        <canvas id="uya-gui-canvas" tabindex="-1"></canvas>
        <canvas id="uya-gui-overlay" tabindex="-1"></canvas>
      </div>
    </div>
    <pre id="uya-gui-log"></pre>
    {{{ SCRIPT }}}
  </body>
</html>
