<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>UyaGUI Web</title>
    <script src="openai_config.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --uya-gui-log-height: 120px;
        --uya-gui-shell-padding: 12px;
        --uya-gui-view-gap: 12px;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f1115;
        color: #d8dee9;
        font: 14px/1.4 monospace;
        overscroll-behavior: none;
      }

      body {
        display: grid;
        grid-template-rows: 1fr;
      }

      body.debug-panel {
        grid-template-rows: auto 1fr var(--uya-gui-log-height);
      }

      #uya-gui-status {
        padding: 8px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        white-space: pre-wrap;
        display: none;
      }

      body.debug-panel #uya-gui-status {
        display: block;
      }

      #uya-gui-root {
        position: relative;
        min-height: 0;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        width: 100%;
        padding: 0;
        box-sizing: border-box;
      }

      body.uya-gui-width-fit-active #uya-gui-root {
        align-items: center;
      }

      body.uya-gui-fullscreen-active #uya-gui-root {
        width: 100%;
        min-height: 100%;
        padding: 0;
      }

      #uya-gui-loading {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        pointer-events: none;
        z-index: 10;
        background:
          radial-gradient(circle at top, rgba(76, 115, 196, 0.16), transparent 42%),
          linear-gradient(180deg, rgba(9, 12, 17, 0.86), rgba(11, 15, 22, 0.78));
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      body.loading-visible #uya-gui-loading {
        display: flex;
      }

      #uya-gui-loading-card {
        width: min(420px, calc(100vw - 48px));
        padding: 24px 24px 20px;
        border: 1px solid rgba(143, 173, 255, 0.18);
        border-radius: 24px;
        box-sizing: border-box;
        background:
          linear-gradient(180deg, rgba(26, 32, 43, 0.96), rgba(15, 19, 27, 0.94));
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      }

      #uya-gui-loading-title {
        color: #f5f7fb;
        font: 700 20px/1.2 system-ui, sans-serif;
        letter-spacing: 0.01em;
      }

      #uya-gui-loading-detail {
        min-height: 1.4em;
        margin-top: 10px;
        color: rgba(225, 232, 242, 0.8);
        font: 13px/1.4 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      }

      #uya-gui-loading-bar {
        position: relative;
        height: 12px;
        margin-top: 18px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      #uya-gui-loading-fill {
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #7ec8ff 0%, #7be0c3 100%);
        box-shadow: 0 0 24px rgba(126, 200, 255, 0.42);
        transition: width 180ms ease;
      }

      #uya-gui-loading-percent {
        margin-top: 12px;
        color: rgba(240, 245, 252, 0.9);
        font: 700 12px/1 system-ui, sans-serif;
        letter-spacing: 0.08em;
        text-align: right;
        text-transform: uppercase;
      }

      #uya-gui-loading.indeterminate #uya-gui-loading-fill {
        width: 36%;
        animation: uya-gui-loading-slide 1.15s ease-in-out infinite;
      }

      @keyframes uya-gui-loading-slide {
        0% {
          transform: translateX(-115%);
        }
        50% {
          transform: translateX(90%);
        }
        100% {
          transform: translateX(240%);
        }
      }

      #uya-gui-stage-shell {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1 1 auto;
        width: 100%;
        min-width: 0;
        min-height: 0;
        margin: 0;
        box-sizing: border-box;
      }

      #uya-gui-stage {
        position: relative;
        display: block;
        flex: 0 0 auto;
      }

      #uya-gui-viewport {
        position: absolute;
        left: 0;
        top: 0;
        transform-origin: 0 0;
        will-change: transform;
      }

      canvas {
        display: block;
        border: 0;
        outline: 0;
        image-rendering: pixelated;
      }

      #uya-gui-canvas {
        background: #000;
      }

      #uya-gui-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      #uya-gui-overlay-canvas {
        position: absolute;
        inset: 0;
        display: none;
        pointer-events: none;
      }

      #uya-gui-ime-sink {
        position: absolute;
        left: 0;
        top: 0;
        width: 1px;
        height: 1px;
        font-size: 16px;
        line-height: 16px;
        padding: 0;
        border: 0;
        margin: 0;
        opacity: 0;
        pointer-events: none;
        resize: none;
        background: transparent;
        color: transparent;
      }

      #uya-gui-view-controls {
        position: fixed;
        top: max(12px, env(safe-area-inset-top));
        right: max(12px, env(safe-area-inset-right));
        z-index: 6;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        box-sizing: border-box;
        pointer-events: none;
      }

      .uya-gui-view-button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        background: rgba(16, 20, 28, 0.88);
        color: #f5f7fb;
        font: 600 14px/1 system-ui, sans-serif;
        letter-spacing: 0.02em;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
        pointer-events: auto;
        cursor: pointer;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .uya-gui-view-button:hover {
        background: rgba(28, 34, 46, 0.96);
      }

      .uya-gui-view-button:focus-visible {
        outline: 2px solid rgba(126, 200, 255, 0.95);
        outline-offset: 2px;
      }

      #uya-gui-log {
        margin: 0;
        padding: 8px 12px;
        min-height: 0;
        max-height: 0;
        overflow: auto;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: #0a0c10;
        white-space: pre-wrap;
        display: none;
      }

      body.debug-panel #uya-gui-log {
        display: block;
        height: var(--uya-gui-log-height);
        min-height: var(--uya-gui-log-height);
        max-height: var(--uya-gui-log-height);
      }

      #uya-gui-mobile-hud {
        position: absolute;
        inset: 0;
        display: none;
        pointer-events: none;
      }

      #uya-gui-mobile-fullscreen {
        position: absolute;
        right: max(12px, env(safe-area-inset-right));
        bottom: max(12px, env(safe-area-inset-bottom));
      }

      body.mobile-doudizhu,
      body.mobile-doudizhu.loading-visible,
      body.mobile-doudizhu.debug-panel {
        grid-template-rows: 1fr;
        background:
          radial-gradient(circle at top, rgba(70, 98, 161, 0.2), transparent 42%),
          linear-gradient(180deg, #121722 0%, #0b0f16 100%);
      }

      body.mobile-doudizhu #uya-gui-status,
      body.mobile-doudizhu #uya-gui-log {
        display: none !important;
      }

      body.mobile-doudizhu #uya-gui-root {
        width: 100%;
        height: 100dvh;
        min-height: 100dvh;
        padding: 0;
      }

      body.mobile-doudizhu #uya-gui-stage-shell {
        margin: 0;
      }

      body.uya-gui-fullscreen-active #uya-gui-root,
      body.mobile-doudizhu.uya-gui-fullscreen-active #uya-gui-root {
        width: 100%;
        min-height: 100%;
        padding: 0;
      }

      body.uya-gui-fullscreen-active #uya-gui-stage-shell {
        margin: 0;
      }

      body.mobile-doudizhu #uya-gui-stage {
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 18px 56px rgba(0, 0, 0, 0.42);
      }

      body.uya-gui-fullscreen-active #uya-gui-stage {
        border-radius: 0;
        box-shadow: none;
      }

      body.mobile-doudizhu #uya-gui-mobile-hud {
        display: block;
      }

      body.mobile-doudizhu #uya-gui-loading {
        padding:
          max(18px, env(safe-area-inset-top))
          max(18px, env(safe-area-inset-right))
          max(18px, env(safe-area-inset-bottom))
          max(18px, env(safe-area-inset-left));
      }

      body.mobile-doudizhu #uya-gui-loading-card {
        width: min(100%, 420px);
      }

      body.mobile-doudizhu.uya-gui-fullscreen-active #uya-gui-mobile-fullscreen {
        display: none;
      }
    </style>
    <script>
      (function() {
        function parseArgsString(text) {
          if (!text) {
            return [];
          }
          var out = [];
          var cur = '';
          var quote = '';
          var escape = false;
          for (var i = 0; i < text.length; ++i) {
            var ch = text[i];
            if (escape) {
              cur += ch;
              escape = false;
              continue;
            }
            if (ch === '\\') {
              escape = true;
              continue;
            }
            if (quote) {
              if (ch === quote) {
                quote = '';
              } else {
                cur += ch;
              }
              continue;
            }
            if (ch === '"' || ch === "'") {
              quote = ch;
              continue;
            }
            if (/\s/.test(ch)) {
              if (cur.length > 0) {
                out.push(cur);
                cur = '';
              }
              continue;
            }
            cur += ch;
          }
          if (cur.length > 0) {
            out.push(cur);
          }
          return out;
        }

        function parseArgsFromLocation() {
          if (typeof window === 'undefined') {
            return [];
          }
          var params = new URLSearchParams(window.location.search);
          var explicitArgs = params.getAll('arg');
          var demo = params.get('demo');
          if (explicitArgs.length > 0) {
            return withQueryArgs(explicitArgs, demo);
          }
          return withQueryArgs(parseArgsString(params.get('args') || ''), demo);
        }

        function upsertArgValue(args, flag, value) {
          if (!value) {
            return args;
          }
          for (var i = 0; i + 1 < args.length; ++i) {
            if (args[i] === flag) {
              args[i + 1] = value;
              return args;
            }
          }
          args.push(flag, value);
          return args;
        }

        function withQueryArgs(args, demo) {
          var out = args.slice();
          upsertArgValue(out, '--demo', demo);
          return out;
        }

        function findArgValue(args, flag, fallback) {
          var value = fallback;
          for (var i = 0; i + 1 < args.length; ++i) {
            if (args[i] === flag) {
              value = args[i + 1];
              ++i;
            }
          }
          return value;
        }

        function resolveBoolFlag(args, positiveFlag, negativeFlag, fallback) {
          var value = fallback;
          for (var i = 0; i < args.length; ++i) {
            if (args[i] === positiveFlag) {
              value = true;
            } else if (args[i] === negativeFlag) {
              value = false;
            }
          }
          return value;
        }

        function ensureStageCanvas(canvasId) {
          var root = document.getElementById('uya-gui-root');
          var stage = document.getElementById('uya-gui-stage');
          var viewport = document.getElementById('uya-gui-viewport');
          var canvas = document.getElementById(canvasId);
          if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.id = canvasId;
            viewport.insertBefore(canvas, document.getElementById('uya-gui-overlay'));
          } else if (canvas.parentNode !== viewport) {
            viewport.insertBefore(canvas, document.getElementById('uya-gui-overlay'));
          }
          root.dataset.canvasId = canvasId;
          return canvas;
        }

        function hasFileLikeSuffix(pathname) {
          return /\/[^/]+\.[^/]+$/.test(pathname || '');
        }

        function currentPageBaseUrl() {
          if (typeof window === 'undefined' || !window.location) {
            return '';
          }
          var pathname = window.location.pathname || '/';
          if (hasFileLikeSuffix(pathname)) {
            pathname = pathname.substring(0, pathname.lastIndexOf('/') + 1);
          } else if (!/\/$/.test(pathname)) {
            pathname += '/';
          }
          return window.location.origin + pathname;
        }

        function resolveAssetUrl(path, prefix) {
          if (!path || /^(?:[a-z]+:)?\/\//i.test(path) || path.indexOf('data:') === 0 || path.indexOf('blob:') === 0) {
            return path;
          }
          var base = prefix || currentPageBaseUrl();
          if (!base) {
            return path;
          }
          try {
            return new URL(path, base).toString();
          } catch (err) {
            return path;
          }
        }

        var bootArgs = parseArgsFromLocation();
        var debugPanel = false;
        if (typeof window !== 'undefined') {
          var debugParams = new URLSearchParams(window.location.search);
          debugPanel = debugParams.get('debug') === '1';
        }

        function applyDebugPanelMode() {
          if (typeof document === 'undefined' || !document.body) {
            return;
          }
          if (debugPanel) {
            document.body.classList.add('debug-panel');
          } else {
            document.body.classList.remove('debug-panel');
          }
        }
        if (typeof document !== 'undefined') {
          if (document.body) {
            applyDebugPanelMode();
          } else {
            document.addEventListener('DOMContentLoaded', applyDebugPanelMode, { once: true });
          }
        }
        function isTruthyQueryValue(value) {
          return value === '1' || value === 'true' || value === 'yes' || value === 'on';
        }

        function isFalsyQueryValue(value) {
          return value === '0' || value === 'false' || value === 'no' || value === 'off';
        }

        function isLikelyMobileDevice() {
          if (typeof window === 'undefined') {
            return false;
          }
          try {
            if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) {
              return true;
            }
          } catch (err) {
          }
          if (typeof navigator !== 'undefined') {
            if (navigator.maxTouchPoints && navigator.maxTouchPoints > 0) {
              return true;
            }
            if (/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '')) {
              return true;
            }
          }
          return window.innerWidth <= 900 && window.innerHeight <= 900;
        }

        function applyMobileDoudizhuMode(enabled) {
          if (typeof document === 'undefined') {
            return;
          }
          if (!document.body) {
            document.addEventListener('DOMContentLoaded', function() {
              applyMobileDoudizhuMode(enabled);
            }, { once: true });
            return;
          }
          if (enabled) {
            document.body.classList.add('mobile-doudizhu');
          } else {
            document.body.classList.remove('mobile-doudizhu');
          }
        }

        function trimString(value) {
          return typeof value === 'string' ? value.trim() : '';
        }

        function normalizeBoolSetting(value, fallback) {
          if (value === undefined || value === null || value === '') {
            return fallback;
          }
          if (value === true || value === 1) {
            return true;
          }
          if (value === false || value === 0) {
            return false;
          }
          var text = String(value).trim().toLowerCase();
          if (isTruthyQueryValue(text)) {
            return true;
          }
          if (isFalsyQueryValue(text)) {
            return false;
          }
          return fallback;
        }

        function normalizeOpenAiApiPath(value) {
          var path = trimString(value);
          if (!path) {
            return '/ddz/decision';
          }
          if (path.charAt(0) !== '/') {
            return '/' + path;
          }
          return path;
        }

        function normalizeWebOpenAiConfig(raw) {
          var obj = raw && typeof raw === 'object' ? raw : {};
          var baseUrl = trimString(obj.baseUrl || obj.base_url || obj.openai_base_url || '');
          var apiPath = normalizeOpenAiApiPath(obj.apiPath || obj.api_path || obj.openai_api_path || '/ddz/decision');
          var apiKey = trimString(obj.apiKey || obj.api_key || obj.bearerToken || obj.bearer_token || obj.openai_api_key || '');
          var model = trimString(obj.model || obj.openai_model || 'gpt-5.4-mini');
          if (baseUrl) {
            baseUrl = baseUrl.replace(/\/+$/, '');
          }
          var enabled = normalizeBoolSetting(obj.enabled, true);
          if (!baseUrl) {
            enabled = false;
          }
          return {
            enabled: enabled,
            baseUrl: baseUrl,
            apiPath: apiPath,
            apiKey: apiKey,
            model: model || 'gpt-5.4-mini'
          };
        }

        function mergeWebOpenAiConfig(baseConfig, overrideConfig) {
          var base = normalizeWebOpenAiConfig(baseConfig);
          var merged = {
            enabled: base.enabled,
            baseUrl: base.baseUrl,
            apiPath: base.apiPath,
            apiKey: base.apiKey,
            model: base.model
          };
          if (!overrideConfig || typeof overrideConfig !== 'object') {
            return normalizeWebOpenAiConfig(merged);
          }
          if (Object.prototype.hasOwnProperty.call(overrideConfig, 'baseUrl') || Object.prototype.hasOwnProperty.call(overrideConfig, 'base_url') || Object.prototype.hasOwnProperty.call(overrideConfig, 'openai_base_url')) {
            merged.baseUrl = trimString(overrideConfig.baseUrl || overrideConfig.base_url || overrideConfig.openai_base_url || '');
          }
          if (Object.prototype.hasOwnProperty.call(overrideConfig, 'apiPath') || Object.prototype.hasOwnProperty.call(overrideConfig, 'api_path') || Object.prototype.hasOwnProperty.call(overrideConfig, 'openai_api_path')) {
            merged.apiPath = normalizeOpenAiApiPath(overrideConfig.apiPath || overrideConfig.api_path || overrideConfig.openai_api_path || '/ddz/decision');
          }
          if (Object.prototype.hasOwnProperty.call(overrideConfig, 'apiKey') || Object.prototype.hasOwnProperty.call(overrideConfig, 'api_key') || Object.prototype.hasOwnProperty.call(overrideConfig, 'bearerToken') || Object.prototype.hasOwnProperty.call(overrideConfig, 'bearer_token') || Object.prototype.hasOwnProperty.call(overrideConfig, 'openai_api_key')) {
            merged.apiKey = trimString(overrideConfig.apiKey || overrideConfig.api_key || overrideConfig.bearerToken || overrideConfig.bearer_token || overrideConfig.openai_api_key || '');
          }
          if (Object.prototype.hasOwnProperty.call(overrideConfig, 'model') || Object.prototype.hasOwnProperty.call(overrideConfig, 'openai_model')) {
            merged.model = trimString(overrideConfig.model || overrideConfig.openai_model || 'gpt-5.4-mini');
          }
          if (Object.prototype.hasOwnProperty.call(overrideConfig, 'enabled')) {
            merged.enabled = normalizeBoolSetting(overrideConfig.enabled, merged.enabled);
          }
          return normalizeWebOpenAiConfig(merged);
        }

        function webOpenAiStorageKey() {
          return 'uyaGuiOpenAiConfig.v1';
        }

        function loadStoredWebOpenAiConfig() {
          if (typeof window === 'undefined' || !window.localStorage) {
            return null;
          }
          try {
            var raw = window.localStorage.getItem(webOpenAiStorageKey());
            if (!raw) {
              return null;
            }
            return JSON.parse(raw);
          } catch (err) {
            return null;
          }
        }

        function saveStoredWebOpenAiConfig(config) {
          if (typeof window === 'undefined' || !window.localStorage) {
            return false;
          }
          try {
            window.localStorage.setItem(webOpenAiStorageKey(), JSON.stringify(normalizeWebOpenAiConfig(config)));
            return true;
          } catch (err) {
            return false;
          }
        }

        function clearStoredWebOpenAiConfig() {
          if (typeof window === 'undefined' || !window.localStorage) {
            return false;
          }
          try {
            window.localStorage.removeItem(webOpenAiStorageKey());
            return true;
          } catch (err) {
            return false;
          }
        }

        function readQueryWebOpenAiConfig() {
          if (typeof window === 'undefined') {
            return {
              clear: false,
              save: false,
              hasOverride: false,
              config: {}
            };
          }
          var params = new URLSearchParams(window.location.search);
          var config = {};
          var hasOverride = false;
          var keyMap = [
            ['openai_base_url', 'baseUrl'],
            ['openai_api_path', 'apiPath'],
            ['openai_api_key', 'apiKey'],
            ['openai_model', 'model'],
            ['openai_enabled', 'enabled']
          ];
          for (var i = 0; i < keyMap.length; ++i) {
            var queryKey = keyMap[i][0];
            var configKey = keyMap[i][1];
            if (params.has(queryKey)) {
              config[configKey] = params.get(queryKey);
              hasOverride = true;
            }
          }
          return {
            clear: isTruthyQueryValue((params.get('openai_clear') || '').toLowerCase()),
            save: isTruthyQueryValue((params.get('openai_save') || '').toLowerCase()),
            hasOverride: hasOverride,
            config: config
          };
        }

        function resolveWebOpenAiConfig() {
          var resolved = normalizeWebOpenAiConfig({});
          if (typeof window !== 'undefined' && window.UYA_GUI_OPENAI_CONFIG) {
            resolved = mergeWebOpenAiConfig(resolved, window.UYA_GUI_OPENAI_CONFIG);
          }
          var stored = loadStoredWebOpenAiConfig();
          if (stored) {
            resolved = mergeWebOpenAiConfig(resolved, stored);
          }
          var query = readQueryWebOpenAiConfig();
          if (query.clear) {
            clearStoredWebOpenAiConfig();
            resolved = normalizeWebOpenAiConfig(window.UYA_GUI_OPENAI_CONFIG || {});
          }
          if (query.hasOverride) {
            resolved = mergeWebOpenAiConfig(resolved, query.config);
          }
          if (query.save && query.hasOverride) {
            saveStoredWebOpenAiConfig(resolved);
          }
          return normalizeWebOpenAiConfig(resolved);
        }

        var defaultCanvasId = findArgValue(bootArgs, '--canvas-id', 'uya-gui-canvas');
        var defaultFontAsset = findArgValue(bootArgs, '--font-asset', 'system_ui_cjk_font.data');
        var requestedDemo = findArgValue(bootArgs, '--demo', '');
        var mobileModeParam = null;
        if (typeof window !== 'undefined') {
          mobileModeParam = new URLSearchParams(window.location.search).get('mobile');
        }
        var mobileDoudizhuMode = false;
        if (isTruthyQueryValue(mobileModeParam)) {
          mobileDoudizhuMode = true;
        } else if (isFalsyQueryValue(mobileModeParam)) {
          mobileDoudizhuMode = false;
        } else {
          mobileDoudizhuMode = requestedDemo === 'doudizhu' && isLikelyMobileDevice();
        }
        if (mobileDoudizhuMode && !requestedDemo) {
          upsertArgValue(bootArgs, '--demo', 'doudizhu');
          requestedDemo = 'doudizhu';
        }
        applyMobileDoudizhuMode(mobileDoudizhuMode);
        var bitmapFontSizes = [10, 11, 12, 13, 14, 15, 16, 17, 18, 20, 22, 24, 25, 26, 29, 31, 35];
        var bitmapFontAssetsBySize = Object.create(null);
        for (var bitmapFontIndex = 0; bitmapFontIndex < bitmapFontSizes.length; bitmapFontIndex += 1) {
          var bitmapFontSize = bitmapFontSizes[bitmapFontIndex];
          bitmapFontAssetsBySize[bitmapFontSize] = {

              feedEditingKey(127, modifierBits(evt));
              clearImeSink();
              evt.preventDefault();
              return;
            }
            if (inputType.indexOf('insertFromPaste') >= 0 || inputType.indexOf('insertFromDrop') >= 0) {
              evt.preventDefault();
            }
          });
          imeSink.addEventListener('input', function(evt) {
            if (imeComposing || evt.isComposing) {
              return;
            }
            if (imeCommitHandled) {
              imeCommitHandled = false;
              imeAwaitingFinalInput = false;
              clearPendingPrintableKey();
              clearImeSink();
              return;
            }
            var text = readImeSinkValue() || (evt && typeof evt.data === 'string' ? evt.data : '');
            var inputType = evt && typeof evt.inputType === 'string' ? evt.inputType : '';
            var fromPaste = inputType.indexOf('insertFromPaste') >= 0 || inputType.indexOf('insertFromDrop') >= 0;
            if (richTextSessionActive()) {
              if (text && !fromPaste) {
                clearPendingPrintableKey();
                if (imeAwaitingFinalInput) {
                  feedRichTextUtf8(RICH_TEXT_HOST_CMD_COMPOSITION_END, text);
                } else {
                  feedRichTextUtf8(RICH_TEXT_HOST_CMD_INSERT_TEXT, text);
                }
              }
              imeAwaitingFinalInput = false;
              clearImeSink();
              return;
            }
            if (text && !fromPaste && !imeAwaitingFinalInput && isSinglePrintableAscii(text)) {
              commitPendingPrintableKeyFromInput(evt, text);
              clearImeSink();
              return;
            }
            if (text && (fromPaste || imeAwaitingFinalInput || !isSinglePrintableAscii(text))) {
              clearPendingPrintableKey();
              feedTextUtf8(text, modifierBits(evt));
            }
            imeAwaitingFinalInput = false;
            clearImeSink();
          });
          imeSink.addEventListener('paste', function(evt) {
            if (!richTextSessionActive()) {
              return;
            }
            var text = '';
            if (evt && evt.clipboardData && typeof evt.clipboardData.getData === 'function') {
              text = evt.clipboardData.getData('text/plain') || '';
            }
            if (text) {
              clearPendingPrintableKey();
              feedRichTextUtf8(RICH_TEXT_HOST_CMD_PASTE_TEXT, text);
              clearImeSink();
            }
            evt.preventDefault();
          });
          imeSink.addEventListener('copy', function(evt) {
            if (!richTextSessionActive()) {
              return;
            }
            var text = richTextSelectionText();
            if (evt && evt.clipboardData && typeof evt.clipboardData.setData === 'function') {
              evt.clipboardData.setData('text/plain', text);
              feedRichTextCommand(RICH_TEXT_HOST_CMD_COPY);
              evt.preventDefault();
            }
          });
          imeSink.addEventListener('cut', function(evt) {
            if (!richTextSessionActive()) {
              return;
            }
            var text = richTextSelectionText();
            if (evt && evt.clipboardData && typeof evt.clipboardData.setData === 'function') {
              evt.clipboardData.setData('text/plain', text);
              feedRichTextCommand(RICH_TEXT_HOST_CMD_CUT);
              evt.preventDefault();
            }
          });
          imeSink.addEventListener('blur', function() {
            blurRichTextSessionFromImeSink(false);
          });
          if (!Module.uyaGuiWindowBound) {
            window.addEventListener('blur', function() {
              blurRichTextSessionFromImeSink(true);
              feed(7, 0, 0, 0, 0, 0);
            });
            document.addEventListener('visibilitychange', function() {
              if (document.hidden) {
                blurRichTextSessionFromImeSink(true);
                feed(7, 0, 0, 0, 0, 0);
              } else {
                Module.uyaGuiUpdateCanvasCss();
                Module.uyaGuiUpdateMobileViewportState();
                feed(8, 0, 0, 0, 0, 0);
              }
            });
            window.addEventListener('resize', function() {
              Module.uyaGuiUpdateCanvasCss();
              Module.uyaGuiUpdateMobileViewportState();
              feed(8, 0, 0, 0, 0, 0);
            });
            window.addEventListener('orientationchange', function() {
              setTimeout(function() {
                Module.uyaGuiUpdateCanvasCss();
                Module.uyaGuiUpdateMobileViewportState();
                feed(8, 0, 0, 0, 0, 0);
              }, 40);
            });
            document.addEventListener('fullscreenchange', function() {
              Module.uyaGuiUpdateCanvasCss();
              Module.uyaGuiUpdateMobileViewportState();
              if (Module.uyaGuiIsFullscreen()) {
                Module.uyaGuiTryLockLandscape();
              }
            });
            Module.uyaGuiWindowBound = true;
          }
          imeSink.dataset.uyaRichtextActive = '0';
          setImeSinkMode('idle');
          canvas.__uyaGuiBound = true;
          return 1;
        };

        Module.uyaGuiPresent = function(rgbaPtr, width, height) {
          var imageData = Module.uyaGuiImageData;
          var ctx = Module.uyaGuiCtx2d;
          if (!imageData || !ctx) {
            return;
          }
          var src = Module.HEAPU8.subarray(rgbaPtr, rgbaPtr + width * height * 4);
          imageData.data.set(src);
          ctx.putImageData(imageData, 0, 0);
          if (!Module.uyaGuiHasPresented) {
            Module.uyaGuiHasPresented = true;
            Module.setStatus('');
            Module.uyaGuiMaybeStartFontLoad();
          }
          Module.uyaGuiLastPresentAt = Date.now();
          if (Module.uyaGuiSyncRichTextIme) {
            Module.uyaGuiSyncRichTextIme();
          }
        };

        Module.uyaGuiPresentRegion = function(rgbaPtr, width, height, rectX, rectY, rectW, rectH) {
          var imageData = Module.uyaGuiImageData;
          var ctx = Module.uyaGuiCtx2d;
          if (!imageData || !ctx || rectW <= 0 || rectH <= 0) {
            return;
          }
          var rowBytes = rectW * 4;
          for (var y = 0; y < rectH; ++y) {
            var srcOffset = rgbaPtr + (((rectY + y) * width + rectX) * 4);
            var dstOffset = (((rectY + y) * width + rectX) * 4);
            imageData.data.set(Module.HEAPU8.subarray(srcOffset, srcOffset + rowBytes), dstOffset);
          }
          ctx.putImageData(imageData, 0, 0, rectX, rectY, rectW, rectH);
          if (!Module.uyaGuiHasPresented) {
            Module.uyaGuiHasPresented = true;
            Module.setStatus('');
            Module.uyaGuiMaybeStartFontLoad();
          }
          Module.uyaGuiLastPresentAt = Date.now();
          if (Module.uyaGuiSyncRichTextIme) {
            Module.uyaGuiSyncRichTextIme();
          }
        };

        Module.uyaGuiClearDirtyOverlay = function() {
          var overlay = Module.uyaGuiOverlayCtx2d;
          if (!overlay) {
            return;
          }
          overlay.clearRect(0, 0, Module.uyaGuiOverlayCanvas.width, Module.uyaGuiOverlayCanvas.height);
        };

        Module.uyaGuiDrawDirtyRect = function(x, y, w, h) {
          if (!Module.uyaGuiDirtyOverlayEnabled) {
            return;
          }
          var overlay = Module.uyaGuiEnsureOverlayContext();
          if (!overlay) {
            return;
          }
          overlay.save();
          overlay.strokeStyle = 'rgba(255, 96, 96, 0.9)';
          overlay.lineWidth = 1;
          overlay.strokeRect(x + 0.5, y + 0.5, Math.max(w - 1, 0), Math.max(h - 1, 0));
          overlay.restore();
        };

        Module.uyaGuiSetDirtyOverlayEnabled = function(enabled) {
          if (!enabled) {
            Module.uyaGuiDirtyOverlayEnabled = false;
            Module.uyaGuiClearDirtyOverlay();
            Module.uyaGuiConfigureOverlayCanvas(false);
            return;
          }
          if (!Module.uyaGuiConfigureOverlayCanvas(true)) {
            Module.printErr('[web] dirty overlay disabled: overlay canvas unavailable');
            Module.uyaGuiDirtyOverlayEnabled = false;
            return;
          }
          Module.uyaGuiDirtyOverlayEnabled = true;
        };

        Module.uyaGuiSetTitle = function(title) {
          if (typeof document !== 'undefined' && title) {
            document.title = title;
          }
        };

        Module.uyaGuiBindMobileControls = function() {
          if (!Module.uyaGuiMobileDoudizhuMode || Module.uyaGuiMobileControlsBound || typeof document === 'undefined') {
            return;
          }
          var root = document.getElementById('uya-gui-root');
          var fullscreenButton = document.getElementById('uya-gui-mobile-fullscreen');

          function requestMobileFullscreen() {
            if (!Module.uyaGuiIsFullscreen()) {
              Module.uyaGuiRequestFullscreen();
            }
          }

          function maybeAutoFullscreen() {
            if (Module.uyaGuiFullscreenAutoAttempted || typeof window === 'undefined') {
              return;
            }
            if (window.innerHeight > window.innerWidth) {
              return;
            }
            Module.uyaGuiFullscreenAutoAttempted = true;
            requestMobileFullscreen();
          }

          if (fullscreenButton) {
            fullscreenButton.addEventListener('click', function(evt) {
              requestMobileFullscreen();
              evt.preventDefault();
            });
          }
          if (root) {
            root.addEventListener('pointerdown', maybeAutoFullscreen, true);
            root.addEventListener('touchstart', maybeAutoFullscreen, { capture: true, passive: true });
          }
          Module.uyaGuiMobileControlsBound = true;
        };

        Module.uyaGuiBindViewControls = function() {
          if (Module.uyaGuiViewControlsBound || typeof document === 'undefined') {
            return;
          }
          var rotateButton = document.getElementById('uya-gui-rotate');
          if (rotateButton) {
            rotateButton.addEventListener('click', function(evt) {
              Module.uyaGuiRotateClockwise();
              evt.preventDefault();
            });
          }
          Module.uyaGuiViewControlsBound = true;
          Module.uyaGuiUpdateRotationUi();
        };

        Module.uyaGuiRequestFullscreen = function() {
          var target = document.getElementById('uya-gui-root') || Module.uyaGuiCanvas || Module.canvas || document.documentElement;
          if (!target) {
            return 0;
          }
          var request = target.requestFullscreen || target.webkitRequestFullscreen || target.msRequestFullscreen;
          if (!request) {
            return 0;
          }
          try {
            var result = request.call(target);
            if (result && typeof result.then === 'function') {
              result.then(function() {
                Module.uyaGuiTryLockLandscape();
                Module.uyaGuiUpdateMobileViewportState();
              }).catch(function() {});
            } else {
              Module.uyaGuiTryLockLandscape();
              Module.uyaGuiUpdateMobileViewportState();
            }
          } catch (err) {
            return 0;
          }
          return 1;
        };

        Module.uyaGuiExposeFile = function(path, suggestedName, mimeType) {
          if (!path || typeof FS === 'undefined') {
            return 0;
          }
          try {
            var bytes = FS.readFile(path);
            Module.uyaGuiFiles[path] = {
              path: path,
              name: suggestedName || path.split('/').pop() || 'download.bin',
              mime: mimeType || 'application/octet-stream',
              size: bytes.length,
            };
            if (Module.uyaGuiAutoDownload && typeof document !== 'undefined') {
              var blob = new Blob([bytes], { type: Module.uyaGuiFiles[path].mime });
              var url = URL.createObjectURL(blob);
              var link = document.createElement('a');
              link.href = url;
              link.download = Module.uyaGuiFiles[path].name;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              setTimeout(function() {
                URL.revokeObjectURL(url);
              }, 0);
            }
            return 1;
          } catch (err) {
            Module.printErr('[web] expose file failed:', path, err);
            return 0;
          }
        };

        Module.uyaGuiResolveScreenshotPath = function() {
          var path = findArgValue(Module.arguments || [], '--screenshot', '');
          return path || '/tmp/last_frame.png';
        };

        Module.uyaGuiShutdown = function() {
          Module.uyaGuiCompleted = true;
          Module.uyaGuiCompletion = {
            completedAt: Date.now(),
            screenshotPath: Module.uyaGuiResolveScreenshotPath(),
            persistData: Module.uyaGuiPersistData,
            persistSynced: !Module.uyaGuiPersistData,
          };
          var screenshotPath = Module.uyaGuiCompletion.screenshotPath;
          if (typeof FS !== 'undefined') {
            try {
              if (FS.analyzePath(screenshotPath).exists) {
                Module.uyaGuiLastScreenshotPath = screenshotPath;
                Module.uyaGuiExposeFile(screenshotPath, screenshotPath.split('/').pop() || 'last_frame.png', 'image/png');
              }
            } catch (err) {
              Module.printErr('[web] screenshot export failed:', err);
            }
            if (Module.uyaGuiPersistData) {
              FS.syncfs(false, function(err) {
                if (err) {
                  Module.uyaGuiCompletion.persistError = String(err);
                }
                Module.uyaGuiCompletion.persistSynced = true;
              });
            }
          }
        };

        Module.setStatus('Booting Web runtime...');
        window.addEventListener('error', function() {
          Module.setStatus('Exception thrown, see browser console.');
        });
      })();
    </script>
  </head>
  <body>
    <div id="uya-gui-status">Booting Web runtime...</div>
    <div id="uya-gui-root">
      <div id="uya-gui-loading" aria-live="polite" aria-atomic="true">
        <div id="uya-gui-loading-card">
          <div id="uya-gui-loading-title">数据加载中</div>
          <div id="uya-gui-loading-detail">Booting Web runtime...</div>
          <div id="uya-gui-loading-bar" role="progressbar" aria-label="Loading progress" aria-valuemin="0" aria-valuemax="100">
            <div id="uya-gui-loading-fill"></div>
          </div>
          <div id="uya-gui-loading-percent">Loading</div>
        </div>
      </div>
      <div id="uya-gui-stage-shell">
        <div id="uya-gui-view-controls" aria-label="View controls">
          <button id="uya-gui-rotate" class="uya-gui-view-button" type="button">旋转 90°</button>
        </div>
        <div id="uya-gui-stage">
          <div id="uya-gui-viewport">
            <canvas id="uya-gui-canvas" tabindex="-1"></canvas>
            <div id="uya-gui-overlay" aria-hidden="true">
              <canvas id="uya-gui-overlay-canvas" tabindex="-1"></canvas>
              <textarea
                id="uya-gui-ime-sink"
                aria-hidden="true"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                inputmode="text"
                enterkeyhint="done"
                spellcheck="false"
                rows="1"></textarea>
            </div>
          </div>
        </div>
      </div>
      <div id="uya-gui-mobile-hud" aria-live="polite">
        <button id="uya-gui-mobile-fullscreen" class="uya-gui-view-button" type="button">进入全屏</button>
      </div>
    </div>
    <pre id="uya-gui-log"></pre>
    {{{ SCRIPT }}}
  </body>
